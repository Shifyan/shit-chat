            font-weight: 500;

            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }

<body class="bg-surface-container-lowest text-on-surface selection:bg-primary-fixed selection:text-primary">
<main class="min-h-screen flex items-center justify-center px-gutter py-xl">
<div class="w-full max-w-[400px] fade-in">
<!-- Brand Identity -->
<div class="mb-xl text-center">
<div class="inline-flex items-center justify-center w-12 h-12 bg-primary rounded mb-lg">
<span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
</div>
<h1 class="font-headline-lg text-headline-lg tracking-tight text-primary">Create an account</h1>
<p class="font-body-md text-body-md text-secondary mt-sm">Start your focused conversation today.</p>
</div>
<!-- Signup Form -->
<form class="space-y-lg" id="signupForm" onsubmit="event.preventDefault();">
<div class="space-y-sm">
<label class="font-label-md text-label-md text-secondary block" for="fullName">Full Name</label>
<input class="w-full h-11 px-md bg-surface border border-outline-variant rounded transition-all font-body-md text-body-md placeholder:text-outline focus:border-primary" id="fullName" name="fullName" placeholder="Jane Doe" required="" type="text"/>
</div>
<div class="space-y-sm">
<label class="font-label-md text-label-md text-secondary block" for="email">Email address</label>
<input class="w-full h-11 px-md bg-surface border border-outline-variant rounded transition-all font-body-md text-body-md placeholder:text-outline focus:border-primary" id="email" name="email" placeholder="jane@example.com" required="" type="email"/>
</div>
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-secondary block" for="password">Password</label>
</div>
<div class="relative">
<input class="w-full h-11 px-md bg-surface border border-outline-variant rounded transition-all font-body-md text-body-md placeholder:text-outline focus:border-primary" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-secondary hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="eyeIcon">visibility_off</span>
</button>
</div>
<p class="font-label-sm text-label-sm text-secondary mt-xs">Must be at least 8 characters long.</p>
</div>
<div class="pt-sm">
<button class="w-full h-11 bg-primary text-on-primary font-label-md text-label-md rounded hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                        Get Started
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
<!-- Social/Alt Signup -->
<div class="mt-lg">
<div class="relative flex items-center py-sm">
<div class="grow border-t border-outline-variant"></div>
<span class="shrink mx-md font-label-sm text-label-sm text-outline">OR CONTINUE WITH</span>
<div class="grow border-t border-outline-variant"></div>
</div>
<div class="grid grid-cols-2 gap-md mt-sm">
<button class="h-11 border border-outline-variant rounded flex items-center justify-center gap-sm font-label-md text-label-md text-primary hover:bg-surface-container-low transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>
                        Google
                    </button>
<button class="h-11 border border-outline-variant rounded flex items-center justify-center gap-sm font-label-md text-label-md text-primary hover:bg-surface-container-low transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.341-3.369-1.341-.454-1.152-1.11-1.459-1.11-1.459-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482C19.137 20.164 22 16.418 22 12c0-5.523-4.477-10-10-10z" fill="currentColor"></path>
</svg>
                        GitHub
                    </button>
</div>
</div>
<!-- Footer Links -->
<div class="mt-xl text-center space-y-md">
<p class="font-body-md text-body-md text-secondary">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline" href="#">Sign in</a>
</p>
<p class="font-label-sm text-label-sm text-outline max-w-xs mx-auto">
                    By continuing, you agree to ChatApp's <a class="underline hover:text-secondary" href="#">Terms of Service</a> and <a class="underline hover:text-secondary" href="#">Privacy Policy</a>.
                </p>
</div>
</div>
</main>
<div class="fixed bottom-0 left-0 w-full p-md text-center pointer-events-none">
<p class="font-label-sm text-label-sm text-outline opacity-40">© 2024 ChatApp Inc. All rights reserved.</p>
</div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerText = 'visibility';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerText = 'visibility_off';
            }
        }

        // Subtle mouse tracking glow effect
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.body.style.background = `radial-gradient(circle at ${x}% ${y}%, #ffffff 0%, #f9f9ff 100%)`;
        });
    </script>
</body></html>
