<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - ChatApp</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        theme: {
          extend: {

                    "on-primary-fixed-variant": "#474747",
                    "primary": "#000000",
                    "tertiary-container": "#1b1b1b",

                    "error-container": "#ffdad6",

                    "primary-fixed-dim": "#c6c6c6",
                    "on-primary-fixed": "#1b1b1b",
                    "surface-bright": "#f9f9ff",
                    "secondary-fixed": "#e2e2e2",
                    "on-surface-variant": "#4c4546",
                    "background": "#f9f9ff",
                    "primary-fixed": "#e2e2e2",
                    "surface-container-low": "#f0f3ff",
                    "outline": "#7e7576",
                    "secondary-container": "#dfe0e0",
                    "on-surface": "#151c27",
                    "surface-container-highest": "#dce2f3",
                    "surface-tint": "#5e5e5e",
                    "surface-variant": "#dce2f3",
                    "error": "#ba1a1a",
                    "on-tertiary-container": "#848484",
                    "tertiary": "#000000",
                    "inverse-primary": "#c6c6c6",
                    "on-tertiary-fixed-variant": "#474747",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed": "#1a1c1c",
                    "on-secondary": "#ffffff",
                    "on-primary": "#ffffff",
                    "surface": "#f9f9ff",
                    "inverse-on-surface": "#ebf1ff",
                    "secondary-fixed-dim": "#c6c6c7",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#c6c6c6",
                    "on-tertiary-fixed": "#1b1b1b",
                    "on-background": "#151c27",
                    "inverse-surface": "#2a313d",

                    "on-secondary-fixed-variant": "#454747",

            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "unit": "4px",
                    "container-max": "1200px",
                    "md": "16px",
                    "gutter": "16px",
                    "lg": "24px",
                    "xs": "4px",
                    "sm": "8px",
                    "xl": "40px"
            },
            "fontFamily": {
                    "body-md": ["Geist", "sans-serif"],
                    "body-lg": ["Geist", "sans-serif"],
                    "label-md": ["Geist", "sans-serif"],

                    "headline-lg": ["Geist", "sans-serif"],

                    "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                    "display": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-sm": ["11px", {"lineHeight": "14px", "letterSpacing": "0.04em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Geist', sans-serif;
            background-color: #F9FAFB;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus-ring:focus {
            outline: none;
            border-color: #000000;
        }
        /* Custom scrollbar to match minimalist theme */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #E5E7EB;
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #D1D5DB;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-md">
<!-- Login Container -->
<main class="w-full max-w-[400px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Logo / Branding Anchor -->
<div class="mb-xl text-center">
<h1 class="font-display text-display text-primary tracking-tight">ChatApp</h1>
<p class="font-body-md text-body-md text-secondary mt-sm">Calm, focused communication.</p>
</div>
<!-- Card -->
<div class="bg-surface-container-lowest border border-outline-variant p-xl shadow-[0px_10px_30px_rgba(0,0,0,0.02)]">
<header class="mb-lg">
<h2 class="font-headline-lg text-headline-lg text-primary">Welcome back</h2>
<p class="font-body-md text-body-md text-secondary">Sign in to your account to continue</p>
</header>
<form action="#" class="space-y-lg" method="POST" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-primary uppercase tracking-widest" for="email">Email Address</label>
<input class="w-full h-11 px-md border border-outline-variant bg-transparent font-body-md text-body-md input-focus-ring transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-primary uppercase tracking-widest" for="password">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full h-11 px-md border border-outline-variant bg-transparent font-body-md text-body-md input-focus-ring transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-secondary hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-12 bg-primary text-on-primary font-body-md text-body-md font-bold active:scale-[0.98] transition-transform flex items-center justify-center gap-sm group" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Social Auth Divider -->
<div class="relative my-xl">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm uppercase">
<span class="bg-surface-container-lowest px-md text-secondary tracking-widest">Or continue with</span>
</div>
</div>
<!-- Social Auth Buttons -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center h-11 border border-outline-variant font-body-md text-body-md text-primary hover:bg-surface-container-low transition-colors">
<img class="w-5 h-5 mr-sm" data-alt="A clean, minimalist monochrome icon of a popular tech brand logo, centered on a white background with soft studio lighting and high-end digital precision. The style is sharp, professional, and reflects a modern interface design aesthetic with deep blacks and crisp edges." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCzcmEwUyJcVUldiwpPvXrqoaKtu2krP7QHxlJuTmHsAknejq5EWVOK9g5j0v__mkcazX1Ze_8adzg78uk61Kg1u6GOA3K9Vf19Nx_LxZTI0IFybj5bXbdVdanSKNzNlDDy8pgvP_0ASiB_LuZCooZrxNR7IRaDbc8kmV9GVO9qoFfgDHNyEO5LXvFt-npXrwY1KqYRBVuSxNeTuM66Zqd8bCaJJT1Szf9MKOwA4iFlRM3E9nqpKdE4"/>
                    Google
                </button>
<button class="flex items-center justify-center h-11 border border-outline-variant font-body-md text-body-md text-primary hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined mr-sm text-[20px]">apps</span>
                    Apple
                </button>
</div>
</div>
<!-- Footer Link -->
<footer class="mt-xl text-center">
<p class="font-body-md text-body-md text-secondary">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline decoration-1 underline-offset-4 transition-all" href="#">Create an account</a>
</p>
</footer>
</main>
<!-- Decorative Atmosphere (Subtle) -->
<div class="fixed top-0 left-0 w-full h-1 bg-primary/10"></div>
<div class="fixed bottom-0 left-0 w-full p-lg flex justify-between items-center pointer-events-none">
<span class="font-label-sm text-label-sm text-outline-variant tracking-widest">VER 2.4.0</span>
<span class="font-label-sm text-label-sm text-outline-variant tracking-widest uppercase">Privacy / Terms</span>
</div>
<script>
        // Micro-interaction for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').style.color = '#000000';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').style.color = '';
            });
        });

        // Simple button press animation enhancement
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.addEventListener('mousedown', () => {
            submitBtn.style.opacity = '0.9';
        });
        submitBtn.addEventListener('mouseup', () => {
            submitBtn.style.opacity = '1';
        });
    </script>
</body></html>
